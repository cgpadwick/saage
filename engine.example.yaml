# Example saage engine config. Point a run at it with:
#     saage run flows/<flow>/flow.yaml --config engine.example.yaml
#
# It governs the run_command safety policy — the patterns the engine refuses to
# execute. With no --config, the safe built-in denylist (see saage/config.py:
# DEFAULT_DENY) is used automatically.
command_policy:
  # Keep the built-in denylist (rm -rf, sudo, mkfs, curl|sh, /etc/shadow, …) and
  # ADD the patterns below. Set to false to start from an empty denylist and
  # define the whole policy yourself.
  use_defaults: true

  # Extra denied patterns — each is a regex, searched case-insensitively against
  # the full command string. A match means the command is refused (returned to
  # the agent as an error) instead of run.
  deny:
    - '\bterraform\s+(destroy|apply)\b'   # no infra changes from a flow
    - '\bkubectl\s+delete\b'
    - '\bdocker\s+(rm|rmi|system\s+prune)\b'

  # Allow-overrides: a WHOLE-COMMAND carve-out for known-safe cases. A command
  # that matches a deny pattern is still permitted if one of these matches the
  # *entire* command (not just a prefix) — so a carve-out can never wave through
  # a chained extra like `rm -rf ./build && rm -rf /`.
  allow:
    - 'rm -rf \./(build|dist|\.pytest_cache)'   # cleaning a local build dir is fine
