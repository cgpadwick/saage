# Brownfield hill-climb on the LeWorldModel (le-wm) repo: tune LeWM training on
# OGBench-Cube for the BEST achievable success_rate (guided-proposal variant).
#
#   setup(cmd: branch + snapshot + research log)
#     -> paper_headline_clean/train/eval (paper recipe on pristine tree, TEST split)
#     -> baseline_clean(cmd) -> baseline_train(cmd, FIXED epochs)
#     -> baseline_eval(cmd, capture best_score) -> baseline_record(cmd)
#     -> hillclimb counting_loop (until target or max_iterations):
#          [propose -> proposal_critic]x3 -> [implement -> verify]x3
#          -> reset_candidate -> clean -> train -> eval -> keep_or_revert
#     -> confirm_clean/train/eval/record (winner at paper budget, TEST split)
#     -> gain_record (gain = confirm − paper on held-out TEST split)
#     -> report(agent: self-contained report.html) -> report_commit(cmd)
#
# paper_headline + confirm are the two headline numbers; gain = confirm − paper
# on the held-out TEST split.
#
# The workspace IS the existing le-wm repo (brownfield): agents edit its config
# YAMLs / model code in place; keep_or_revert uses git on a dedicated branch
# (saage-hillclimb) to keep or roll back each experiment. Checkpoints live
# outside the repo under $STABLEWM_HOME/checkpoints/ and the best one is
# promoted to {{ best_name }} on every keep.
#
# The TRAINING BUDGET IS FIXED: every experiment trains exactly train_epochs
# epochs (~2.5 h/epoch on this box -> ~20 h per experiment at 8 epochs), so
# scores are comparable. The EVAL PROTOCOL IS FROZEN: eval.py +
# config/eval/cube.yaml (50 episodes, seed 42) + solver.n_steps=10 (the paper's
# CEM budget for cube, App. D); agents may not modify it.
#
# HELD-OUT TEST: hill-climb selection (baseline_eval + in-loop eval -> keep_or_revert)
# runs on split=val; the headline confirm_eval runs ONCE on split=test. val and test
# draw from DISJOINT halves of the eval episodes (eval.py partitions valid start
# points with a fixed master seed), so the reported number carries no test-set
# selection bias — same protocol as flows/greenfield_ml (--split val / test).
#
# Run (long-lived — use tmux/nohup):
#   OPENROUTER_API_KEY=... saage run contrib/lewm_hillclimb_guided/flow.yaml
#   ... --set train_epochs=8 --set target_success=74.0   # tunable
provider: { type: openrouter, model: "deepseek/deepseek-v4-flash" }
workspace: /home/cpadwick/code/le-wm
venv: .venv
# what the remote sidecar collects from the workspace (local runs ignore this)
artifacts: [experiments.jsonl, research_log.md, report.html]
shared:
  task: >-
    Improve the training of LeWorldModel (LeWM) — a JEPA world model (ViT-tiny
    encoder + autoregressive transformer predictor, loss = next-embedding MSE +
    lambda * SIGReg) — on the OGBench-Cube manipulation task. The paper reports
    74%; our measured baseline (this exact repo state, 8 epochs, A100) is 76.0;
    DINO-WM reaches 86 on this task. The goal is the BEST achievable
    success_rate on the frozen eval protocol — every point counts.
    Metric: success_rate in [0, 100] from eval.py (higher is better).
  target_success: 100.0           # best-score mode: never exit early on a target
  best_score: -1.0
  candidate_score: -1.0
  consecutive_failures: 0
  train_epochs: 8                # FIXED budget per experiment (user-set); ~2.5 h/epoch
  num_workers: 6                 # dataloader workers; raise on big cloud boxes
                                 # (--set num_workers=24 on a 30-vCPU A100). Safe:
                                 # batch order comes from the seeded sampler; workers
                                 # only parallelize chunk fetch + decompression.
  stablewm_home: "$HOME/.stable-wm"   # where datasets/checkpoints live (shell-expanded)
  exp_name: lewm_cube_exp        # checkpoint dir each experiment trains into
  best_name: lewm_cube_best      # best checkpoint dir, promoted on every keep
  smoke_name: lewm_smoke         # checkpoint dir the verify smoke-run uses
  confirm_epochs: 10             # final confirmation run at the paper's budget
  confirm_name: lewm_cube_confirm
  confirm_score: -1.0
  paper_test_score: -1.0         # paper-recipe headline on the held-out TEST split
  test_num_eval: 200             # held-out TEST size for the headline evals (heavy);
                                 # in-loop val stays at cube.yaml's 50 (cheap selection)
  paper_name: lewm_cube_paper    # checkpoint dir for the paper-recipe headline retrain
  specialization_gain: -999.0    # seeded so the key always exists; set by gain_record
  run_branch: saage-hillclimb    # experiment branch; remote handoff overrides it
                                 # (--set run_branch=saage-run-<id>) so kept
                                 # commits land on the branch the node pushes back

workflow:
  # ---- setup: experiment branch, snapshot commit, research log, staged helper ----
  - id: setup
    type: command
    run: '{{ python }} "{{ flow_dir }}/setup_experiment.py" --train-epochs {{ train_epochs }} --target {{ target_success }} --branch "{{ run_branch }}"'

  # ---- paper-recipe headline: the REFERENCE-LOW number. Runs first, while the
  # working tree is still the pristine paper recipe (no git checkout needed).
  # Same budget + same held-out TEST split as the specialized headline, so the
  # two are directly subtractable (gain_record).
  - id: paper_headline_clean
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/clean_ckpt.py" --name {{ paper_name }}'
  - id: paper_headline_train
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python train.py data=ogb output_model_name={{ paper_name }} subdir={{ paper_name }} trainer.max_epochs={{ confirm_epochs }} num_workers={{ num_workers }} wandb.enabled=False'
  - id: paper_headline_eval
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python eval.py --config-name=cube.yaml policy={{ paper_name }}/weights_epoch_{{ confirm_epochs }}.pt solver.n_steps=10 split=test eval.num_eval={{ test_num_eval }}'
    set: { paper_test_score: "'success_rate': (-?[0-9.]+)" }

  # ---- baseline at the SAME fixed budget, so hill-climb scores are comparable ----
  - id: baseline_clean
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/clean_ckpt.py" --name {{ exp_name }} --name {{ smoke_name }}'
  - id: baseline_train
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python train.py data=ogb output_model_name={{ exp_name }} subdir={{ exp_name }} trainer.max_epochs={{ train_epochs }} num_workers={{ num_workers }} wandb.enabled=False'
  - id: baseline_eval
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python eval.py --config-name=cube.yaml policy={{ exp_name }}/weights_epoch_{{ train_epochs }}.pt solver.n_steps=10 split=val'
    set: { best_score: "'success_rate': (-?[0-9.]+)" }
  - id: baseline_record
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/keep_or_revert.py" --candidate {{ best_score }} --best -1 --failures 0 --exp {{ exp_name }} --best-name {{ best_name }} --baseline true'
    set:
      best_score: "BEST_SCORE=(-?[0-9.]+)"
      consecutive_failures: "FAILURES=([0-9]+)"

  # ---- hill-climb: one experiment per iteration, keep only what improves ----
  - id: hillclimb
    type: counting_loop
    max_iterations: 8
    exit_when: "best_score >= target_success"
    body:
      # cheap vetting before a ~20 h train run
      - id: propose_loop
        type: retry_loop
        max_iterations: 3
        action:
          id: propose
          type: agent
          skill: propose
          max_steps: 15
          set: { current_proposal: "(?s)(.+)" }   # the whole reply
        check: { id: proposal_critic, type: agent, skill: proposal_critic, max_steps: 10 }
      # one-paragraph digest of the accepted proposal -> proposals/summary.md, which
      # keep_or_revert writes into research_log.md (kept terse so the proposer can
      # re-read the whole log cheaply every iteration; the full proposal goes only
      # to experiments.jsonl for the human report)
      - { id: summarize, type: agent, skill: summarize, max_steps: 6 }
      - id: implement_loop
        type: retry_loop
        max_iterations: 3
        action: { id: implement, type: agent, skill: implement, max_steps: 40 }
        check:  { id: verify,    type: agent, skill: verify,    max_steps: 25 }
      # a failed train/eval must read as -1 (revert), not as the previous score
      - id: reset_candidate
        type: command
        run: 'echo "CANDIDATE=-1"'
        set: { candidate_score: "CANDIDATE=(-?[0-9.]+)" }
      - id: clean
        type: command
        run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/clean_ckpt.py" --name {{ exp_name }} --name {{ smoke_name }}'
      - id: train
        type: command
        run: 'STABLEWM_HOME="{{ stablewm_home }}" python train.py data=ogb output_model_name={{ exp_name }} subdir={{ exp_name }} trainer.max_epochs={{ train_epochs }} num_workers={{ num_workers }} wandb.enabled=False'
      - id: eval
        type: command
        run: 'STABLEWM_HOME="{{ stablewm_home }}" python eval.py --config-name=cube.yaml policy={{ exp_name }}/weights_epoch_{{ train_epochs }}.pt solver.n_steps=10 split=val'
        set: { candidate_score: "'success_rate': (-?[0-9.]+)" }
      - id: keep_or_revert
        type: command
        run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/keep_or_revert.py" --candidate {{ candidate_score }} --best {{ best_score }} --failures {{ consecutive_failures }} --exp {{ exp_name }} --best-name {{ best_name }}'
        set:
          best_score: "BEST_SCORE=(-?[0-9.]+)"
          consecutive_failures: "FAILURES=([0-9]+)"

  # ---- confirmation: the winning config at the paper's 10-epoch budget ----
  # the working tree is the best kept state (failures were reverted), so this
  # trains the winner properly before the headline number is reported
  - id: confirm_clean
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" {{ python }} "{{ flow_dir }}/clean_ckpt.py" --name {{ confirm_name }}'
  - id: confirm_train
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python train.py data=ogb output_model_name={{ confirm_name }} subdir={{ confirm_name }} trainer.max_epochs={{ confirm_epochs }} num_workers={{ num_workers }} wandb.enabled=False'
  - id: confirm_eval
    type: command
    run: 'STABLEWM_HOME="{{ stablewm_home }}" python eval.py --config-name=cube.yaml policy={{ confirm_name }}/weights_epoch_{{ confirm_epochs }}.pt solver.n_steps=10 split=test eval.num_eval={{ test_num_eval }}'
    set: { confirm_score: "'success_rate': (-?[0-9.]+)" }
  - id: confirm_record
    type: command
    run: 'echo "- CONFIRMATION: best config retrained at {{ confirm_epochs }} epochs -> HELD-OUT TEST success_rate={{ confirm_score }} (split=test; best 8-epoch VAL score used for selection: {{ best_score }})" >> research_log.md && echo "CONFIRMED={{ confirm_score }}"'

  - id: gain_record
    type: command
    run: '{{ python }} "{{ flow_dir }}/gain_record.py" --specialized {{ confirm_score }} --paper {{ paper_test_score }} --dino 86.0'
    set: { specialization_gain: "GAIN=(-?[0-9.]+)" }

  # ---- final report: one LLM agent writes the whole self-contained report.html
  # (outcome/winner prose, per-experiment table, inline-SVG hill-climb chart),
  # then commit it. Reads whatever upstream files exist (no hardcoded schema).
  - { id: report, type: agent, skill: report, max_steps: 25 }
  - id: report_commit
    type: command
    run: 'git -c user.email=saage@local -c user.name=saage add research_log.md report.html && git -c user.email=saage@local -c user.name=saage commit -m "saage: hillclimb report"'
