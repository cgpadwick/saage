# Submit a (simulated) batch job, capture its id, then poll the scheduler until
# the job completes — synchronously, with a hard wall-clock cap so it can never
# hang. Demonstrates command capture (job_id) + polling_loop + templated poll.
provider: { type: openrouter, model: deepseek/deepseek-v4-flash }

workflow:
  - id: submit
    type: command
    run: "{{ python }} submit.py"
    set: { job_id: "job (\\d+)" }          # capture job id into shared
  - id: wait
    type: polling_loop
    interval_seconds: 0                      # 0 keeps tests fast; use real value live
    max_wait_seconds: 60
    poll:   { id: poll,     type: command, run: "{{ python }} status.py {{ job_id }}" }
    status: { id: classify, type: agent,   skill: classify_job }
